<div
  class="drop-zone"
  [class.dragging]="isDragging"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (click)="triggerFileInput(); $event.stopPropagation()"
>
  <div class="drop-zone-content">
    <div class="drop-icon" aria-hidden="true">
      <span></span>
    </div>
    <div>
      <p class="drop-title">Drop images to build your PDF</p>
      <p class="drop-text">Tap to browse or drag PNG and JPEG files here.</p>
    </div>
    <p class="drop-hint">Up to 10MB per image</p>
  </div>
</div>

<input
  #fileInput
  type="file"
  multiple
  accept="image/png, image/jpeg, image/jpg"
  (change)="onFilesSelected($event)"
  class="hidden-input"
>
