<div class="actions">
  <button
    class="convert-btn"
    type="button"
    (click)="onGenerateClick()"
    [disabled]="isDisabled()"
  >
    @if (isGenerating) {
      <span class="button-text">
        <span class="spinner"></span>
        Creating PDF
      </span>
    } @else {
      <span class="button-text">
        Convert and download
      </span>
    }
  </button>
</div>
