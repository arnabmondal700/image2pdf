<article
  class="file-item"
>
  <div class="thumb-wrap">
    @if (file?.url) {
      <img [src]="file?.url" [alt]="file?.name || 'Uploaded image preview'" class="thumb" [ngStyle]="getRotationStyle()" loading="lazy">
    }
    <span class="file-index">{{ index + 1 }}</span>
  </div>

  <div class="file-meta">
    <h3 class="file-name">{{ file?.name }}</h3>
    <p class="file-type">Ready for PDF</p>
  </div>

  <div class="file-actions">
    <button class="rotate-left-btn" type="button" (click)="onRotateLeft()" title="Rotate 90° counter-clockwise">
      ↶ Rotate
    </button>
    <button class="rotate-right-btn" type="button" (click)="onRotateRight()" title="Rotate 90° clockwise">
      ↷ Rotate
    </button>
    <button class="edit-btn" type="button" (click)="onEdit()" title="Edit image">
      Edit
    </button>
    <button class="remove-btn" type="button" (click)="onRemove()" title="Delete image">
      Delete
    </button>
  </div>
</article>
