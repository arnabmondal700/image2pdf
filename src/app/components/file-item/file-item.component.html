<article
  class="file-item"
  draggable="true"
  [class.dragging]="isDragging"
  [class.dragover]="isDragOver"
  (dragstart)="onDragStart($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (dragend)="onDragEnd($event)"
>
  <div class="thumb-wrap">
    @if (file?.url) {
      <img [src]="file?.url" [alt]="file?.name || 'Uploaded image preview'" class="thumb">
    }
    <span class="file-index">{{ index + 1 }}</span>
  </div>

  <div class="file-meta">
    <h3 class="file-name">{{ file?.name }}</h3>
    <p class="file-type">Ready for PDF</p>
  </div>

  <div class="file-actions">
    <button class="remove-btn" type="button" (click)="onRemove()" title="Delete image">
      Delete
    </button>
    <button class="edit-btn" type="button" (click)="onEdit()" title="Edit image">
      Edit
    </button>
  </div>
</article>
