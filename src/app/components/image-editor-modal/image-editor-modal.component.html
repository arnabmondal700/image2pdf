<div class="modal-backdrop" (click)="close()">
  <section class="editor-modal" (click)="$event.stopPropagation()" aria-modal="true" role="dialog">
    <header class="editor-header">
      <div>
        <h2>Edit image</h2>
        <p>{{ file?.name }}</p>
      </div>
      <button class="icon-btn close-btn" type="button" title="Close editor" (click)="close()">x</button>
    </header>

    <div class="canvas-wrap">
      <canvas
        #editorCanvas
        width="760"
        height="500"
        (pointerdown)="onPointerDown($event)"
        (pointermove)="onPointerMove($event)"
        (pointerup)="onPointerUp($event)"
        (pointercancel)="onPointerUp($event)"
      ></canvas>
    </div>

    @if (showAdvancedFilters) {
      <div class="filters-panel">
        <div class="filter-group">
          <label>Brightness: {{ filters.brightness }}%</label>
          <input
            type="range"
            min="0"
            max="200"
            [(ngModel)]="filters.brightness"
            (change)="onFilterChange()"
            class="filter-slider"
          >
        </div>
        <div class="filter-group">
          <label>Contrast: {{ filters.contrast }}%</label>
          <input
            type="range"
            min="0"
            max="200"
            [(ngModel)]="filters.contrast"
            (change)="onFilterChange()"
            class="filter-slider"
          >
        </div>
        <div class="filter-group">
          <label>Grayscale: {{ filters.grayscale }}%</label>
          <input
            type="range"
            min="0"
            max="100"
            [(ngModel)]="filters.grayscale"
            (change)="onFilterChange()"
            class="filter-slider"
          >
        </div>
        <div class="filter-group">
          <label>Sharpen: {{ filters.sharpen }}%</label>
          <input
            type="range"
            min="0"
            max="100"
            [(ngModel)]="filters.sharpen"
            (change)="onFilterChange()"
            class="filter-slider"
          >
        </div>
        <button class="secondary-btn" type="button" (click)="resetFilters()" [disabled]="!isLoaded">
          Reset Filters
        </button>
      </div>
    }

    <footer class="editor-actions">
      <div class="tool-group">
        <button class="tool-btn" type="button" (click)="rotateLeft()" [disabled]="!isLoaded">
          Rotate left
        </button>
        <button class="tool-btn" type="button" (click)="rotateRight()" [disabled]="!isLoaded">
          Rotate right
        </button>
        <button class="tool-btn" type="button" (click)="toggleAdvancedFilters()" [disabled]="!isLoaded">
          {{ showAdvancedFilters ? 'Hide' : 'Show' }} Filters
        </button>
      </div>
      <div class="action-group">
        <button class="secondary-btn" type="button" (click)="close()">Cancel</button>
        <button class="primary-btn" type="button" (click)="applyEdit()" [disabled]="!isLoaded || !isCropValid()">
          Apply
        </button>
      </div>
    </footer>
  </section>
</div>
