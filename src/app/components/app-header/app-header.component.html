<header class="header">
  <div class="header-top">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px">
        <rect x="2" y="2" width="36" height="36" rx="8" fill="rgba(255,255,255,0.9)" stroke="rgba(255,255,255,0.52)" stroke-width="1.5"/>
        <text x="20" y="26" text-anchor="middle" fill="#4f46e5" font-size="14" font-weight="900" font-family="system-ui" letter-spacing="0.5">PDF</text>
      </svg>
    </div>
    <div class="header-copy">
      <span class="eyebrow">Studio converter</span>
      <h1 class="title">{{ title }}</h1>
      <p class="subtitle">{{ subtitle }}</p>
    </div>
  </div>

  <!-- Tool navigation -->
  <nav class="tool-nav" aria-label="PDF tools">
    @for (tool of tools; track tool.id) {
      <a
        class="tool-nav-link"
        [routerLink]="'/' + tool.path"
        routerLinkActive="active"
        [attr.title]="tool.description"
      >
        <i class="tool-nav-icon" [class]="getToolIcon(tool)"></i>
        <span class="tool-nav-label">{{ tool.name }}</span>
      </a>
    }
  </nav>
</header>
