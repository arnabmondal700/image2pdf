@if (uploadedFiles.length > 0) {
  <section class="file-list-section">
    <div class="file-list-header">
      <div>
        <span class="eyebrow">Preview queue</span>
        <h2 class="file-list-title">
          {{ uploadedFiles.length }} {{ uploadedFiles.length === 1 ? 'image' : 'images' }}
        </h2>
      </div>
      <span class="file-count-badge">{{ uploadedFiles.length }}</span>
    </div>

    <div
      class="file-list"
      cdkDropList
      [cdkDropListData]="uploadedFiles"
      cdkDropListOrientation="mixed"
      (cdkDropListDropped)="onDrop($event)"
    >
      @for (file of uploadedFiles; track $index) {
        <file-item
          cdkDrag
          [file]="file"
          [index]="$index"
          (removeFile)="onFileRemove($event)"
          (editFile)="onFileEdit($event)"
          (rotateFile)="onFileRotate($event)"
        ></file-item>
      }
    </div>
  </section>
}
