@if (uploadedFiles.length > 0) {
  <section class="file-list-section">
    <div class="file-list-header">
      <div>
        <span class="eyebrow">Preview queue</span>
        <h2 class="file-list-title">
          {{ uploadedFiles.length }} {{ uploadedFiles.length === 1 ? 'image' : 'images' }}
        </h2>
      </div>
      <span class="file-count-badge">{{ uploadedFiles.length }}</span>
    </div>

    <div class="file-list">
      @for (file of uploadedFiles; track $index) {
        <file-item
          [file]="file"
          [index]="$index"
          [isDragging]="draggedIndex === $index"
          [isDragOver]="dragoverIndex === $index"
          (removeFile)="onFileRemove($event)"
          (editFile)="onFileEdit($event)"
          (dragStart)="onDragStart($event)"
          (dragOver)="onDragOver($event)"
          (dragLeave)="onDragLeave()"
          (drop)="onDrop($event)"
          (dragEnd)="onDragEnd()"
        ></file-item>
      }
    </div>
  </section>
}
