<div class="app-container">
  <div class="app-card">
    <!-- Header -->
    <app-header></app-header>

    <!-- Drag and Drop Zone -->
    <drag-drop-zone
      [isDragging]="isDragging"
      (filesSelected)="onFilesSelected($event)"
      (openFileDialog)="onDragLeaveZone()"
    ></drag-drop-zone>


    <!-- File List -->
    <file-list
      [uploadedFiles]="uploadedFiles"
      (fileRemoved)="onFileRemoved($event)"
      (fileEditRequested)="onFileEditRequested($event)"
      (fileReordered)="onFileReordered($event)"
    ></file-list>

    <!-- Action Button -->
    <generate-pdf-button
      [uploadedFiles]="uploadedFiles"
      [isGenerating]="isGenerating"
      (generateClicked)="onGeneratePDF()"
    ></generate-pdf-button>
  </div>

  @if (editingFile && editingFileIndex !== null) {
    <image-editor-modal
      [file]="editingFile"
      [index]="editingFileIndex"
      (editApplied)="onImageEditApplied($event)"
      (closed)="closeImageEditor()"
    ></image-editor-modal>
  }
</div>
