<div class="ocr-text-export-container">
  <div class="header">
    <h1>OCR Text Export</h1>
    <p>Extract text from images or scanned PDFs using OCR technology</p>
  </div>

  <drag-drop-zone
    [isDragging]="false"
    [accept]="'image/png, image/jpeg, image/jpg, application/pdf'"
    dropTitle="Drop images to build your PDF"
    dropText="Tap to browse or drag image files here."
    (filesSelected)="onFilesSelected($event)">
  </drag-drop-zone>

  <div *ngIf="error" class="error-message">
    <strong>Error:</strong> {{ error }}
  </div>

  <div *ngIf="file" class="export-section">
    <div class="file-info">
      <h3>Selected File</h3>
      <p>{{ file.name }}</p>
    </div>

    <div class="settings" *ngIf="!text">
      <label>
        <span>Language</span>
        <select [(ngModel)]="language">
          <option value="eng">English</option>
          <option value="hin">Hindi</option>
          <option value="ben">Bengali</option>
          <option value="ara">Arabic</option>
          <option value="spa">Spanish</option>
        </select>
      </label>
    </div>

    <div class="actions" *ngIf="!text">
      <button class="primary" (click)="extractText()" [disabled]="isProcessing">
        {{ isProcessing ? 'Extracting...' : 'Extract Text' }}
      </button>
      <button class="secondary" (click)="clearAll()" [disabled]="isProcessing">Clear</button>
    </div>

    <div class="progress" *ngIf="progress">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="progress.total ? (progress.current / progress.total) * 100 : 0"></div>
      </div>
      <div class="progress-text">{{ progress.status }} ({{ (progress.current / progress.total) * 100 | number:'1.0-0' }}%)</div>
      <button class="secondary" (click)="cancel()" *ngIf="isProcessing">Cancel</button>
    </div>

    <div *ngIf="text" class="result-section">
      <div class="text-preview">{{ text }}</div>
      <div class="result-header">
        <h3>Extracted Text</h3>
        <div class="result-actions" *ngIf="text">
          <button class="secondary" (click)="copyText()">Copy</button>
          <button class="secondary" (click)="downloadTxt()">Download .txt</button>
        </div>
      </div>
    </div>
  </div>

  <seo-content [config]="seoContentConfig"></seo-content>
</div>
