<div class="ocr-tool">
  <h2>OCR Text Export</h2>
  <p class="description">Upload an image or scanned PDF to extract text and download as .txt.</p>

  <div class="settings">
    <label>
      <span>Language</span>
      <select [(ngModel)]="language">
        <option *ngFor="let lang of availableLanguages" [value]="lang.code">{{ lang.label }}</option>
      </select>
    </label>
    <label class="checkbox">
      <input type="checkbox" [(ngModel)]="preserveLayout" />
      <span>Preserve layout</span>
    </label>
  </div>

  <drag-drop-zone
    [accept]="'image/png, image/jpeg, image/jpg, application/pdf'"
    (filesSelected)="onFilesSelected($event)"
  ></drag-drop-zone>

  <div class="actions" *ngIf="file && !result">
    <button class="primary" (click)="extractText()" [disabled]="isProcessing">Extract Text</button>
    <button class="secondary" (click)="clear()">Clear</button>
  </div>

  <div class="progress" *ngIf="progress">
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="progress.total ? (progress.current / progress.total) * 100 : 0"></div>
    </div>
    <div class="progress-text">{{ progress.status }} ({{ progress.current }}/{{ progress.total }})</div>
    <button class="secondary" (click)="cancel()" *ngIf="isProcessing">Cancel</button>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>

  <div class="result" *ngIf="result">
    <pre class="text-output">{{ result.text }}</pre>
    <div class="actions">
      <button class="primary" (click)="downloadTxt()">Download .txt</button>
      <button class="secondary" (click)="copyToClipboard()">Copy to clipboard</button>
    </div>
  </div>
</div>
